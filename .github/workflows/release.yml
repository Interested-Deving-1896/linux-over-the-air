name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-engine:
    name: Build Rust engine (${{ matrix.target }})
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - armv7-unknown-linux-gnueabihf
          - riscv64gc-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        run: |
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            gcc-arm-linux-gnueabihf \
            gcc-riscv64-linux-gnu \
            protobuf-compiler

      - name: Build
        working-directory: engine
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lota-engine-${{ matrix.target }}
          path: engine/target/${{ matrix.target }}/release/lota-engine

  build-cli:
    name: Build Go CLI (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: arm
          - goos: linux
            goarch: riscv64
          - goos: android
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build
        working-directory: client/cli
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -o lota-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/lota/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lota-cli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: client/cli/lota-${{ matrix.goos }}-${{ matrix.goarch }}

  release:
    name: Create GitHub Release
    needs: [build-engine, build-cli]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/**/*
          generate_release_notes: true
